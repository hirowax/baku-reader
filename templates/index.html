<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Baku Reader</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; background: #f0f0f0; display: flex;
         justify-content: center; align-items: center; min-height: 100vh; }
  .card { background: #fff; border-radius: 10px; padding: 40px;
          box-shadow: 0 4px 20px rgba(0,0,0,.1); width: 100%; max-width: 560px; }
  h1 { font-size: 1.4rem; margin-bottom: 8px; color: #333; }
  p.sub { color: #888; font-size: .9rem; margin-bottom: 24px; }
  input[type=text] { width: 100%; padding: 12px; border: 1px solid #ddd;
                     border-radius: 6px; font-size: 1rem; outline: none; }
  input[type=text]:focus { border-color: #e05; }
  button { margin-top: 12px; width: 100%; padding: 12px;
           background: #e05; color: #fff; border: none;
           border-radius: 6px; font-size: 1rem; cursor: pointer; }
  button:hover { background: #c04; }
  .error { margin-top: 16px; color: #e05; font-size: .9rem; }
</style>
</head>
<body>
<div class="card">
  <h1>Baku Reader</h1>
  <p class="sub">スレッドURLを貼り付けると、全レスを1ページで表示します。</p>
  <form method="POST">
    <input type="text" name="url" placeholder="https://bakusai.com/thr_res/..." autofocus>
    <button type="submit">全レスを読む</button>
  </form>
  {% if error %}
  <p class="error">{{ error }}</p>
  {% endif %}
</div>
</body>
</html>
